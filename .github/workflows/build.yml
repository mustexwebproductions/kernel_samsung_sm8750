name: Build SM8750 Kernel with ReSukiSU + ZeroMount

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      # 1) Checkout des Kernel-Fork (inkl. Patch)
      - name: Checkout
        uses: actions/checkout@v4

      # 2) ZeroMount-Patch anwenden
      - name: Apply ZeroMount Patch
        run: |
          git apply patches/Zeromount/60_zeromount-android15-6.6.patch

      # 3) Toolchain holen (AOSP clang für android15-6.6)
      - name: Setup Toolchain
        run: |
          mkdir -p toolchain
          cd toolchain
          git clone --depth=1 https://github.com/lemniskett/aosp-clang android15-6.6
          cd ..

      # 4) Defconfig auswählen und bauen
      - name: Build Kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export PATH="${PWD}/toolchain/android15-6.6/bin:${PATH}"

          # defconfig aus arch/arm64/configs/defconfig
          make O=out ARCH=arm64 defconfig

          make -j$(nproc --all) O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-android-

      # 5) Artefakt packen
      - name: Upload Artefakt
        uses: actions/upload-artifact@v4
        with:
          name: sm8750-kernel-resukisu-zeromount
          path: out/arch/arm64/boot/Image.gz-dtb
